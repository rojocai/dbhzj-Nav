<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东白湖之家 - 上网从这里开始</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
    <style id="dynamicStyles">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            color: #e0e0e0;
            transition: background 0.5s;
        }
        .bg-stars {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 0;
        }
        .bg-stars::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.12), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,0.15), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.08), transparent);
            background-size: 200px 200px;
            pointer-events: none;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        .search-section { text-align: center; padding: 50px 20px 30px; }
        .search-section .logo-img { max-width: 120px; max-height: 120px; margin-bottom: 10px; border-radius: 16px; }
        .search-section h1 { font-size: 42px; font-weight: 700; background: linear-gradient(90deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; letter-spacing: 2px; }
        .search-section p { font-size: 14px; color: #8888aa; margin-bottom: 25px; }
        .search-box { display: inline-flex; max-width: 600px; width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; overflow: hidden; backdrop-filter: blur(10px); transition: all 0.3s; }
        .search-box:focus-within { border-color: #667eea; box-shadow: 0 0 20px rgba(102,126,234,0.3); background: rgba(255,255,255,0.12); }
        .search-box select { background: transparent; border: none; color: #aaa; padding: 0 10px 0 18px; font-size: 14px; outline: none; cursor: pointer; min-width: 85px; }
        .search-box select option { background: #1a1a2e; color: #e0e0e0; }
        .search-box input { flex: 1; background: transparent; border: none; padding: 14px 12px; font-size: 16px; color: #fff; outline: none; }
        .search-box input::placeholder { color: #666; }
        .search-box button { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; padding: 0 28px; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        .search-box button:hover { opacity: 0.85; }

        .quick-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-top: 25px; }
        .quick-links a { display: flex; align-items: center; gap: 6px; padding: 6px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; color: #bbb; text-decoration: none; font-size: 13px; transition: all 0.2s; }
        .quick-links a:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-2px); }
        .quick-links a img { width: 18px; height: 18px; border-radius: 4px; }

        .categories { margin-top: 40px; }

        /* ===== 卡片模式 ===== */
        .layout-card .category { margin-bottom: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px 24px; backdrop-filter: blur(8px); transition: all 0.3s; }
        .layout-card .category:hover { border-color: rgba(102,126,234,0.3); background: rgba(255,255,255,0.05); }
        .layout-card .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .layout-card .category-header .icon { font-size: 22px; }
        .layout-card .category-header h2 { font-size: 18px; font-weight: 600; color: #c8c8e8; }
        .layout-card .category-header .count { font-size: 12px; color: #666; margin-left: auto; }
        .layout-card .site-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .layout-card .site-grid a { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; text-decoration: none; color: #ccc; font-size: 13px; transition: all 0.25s; cursor: grab; user-select: none; }
        .layout-card .site-grid a:active { cursor: grabbing; }
        .layout-card .site-grid a:hover { background: rgba(102,126,234,0.15); border-color: rgba(102,126,234,0.3); color: #fff; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(102,126,234,0.15); }
        .layout-card .site-grid a.dragging { opacity: 0.4; transform: scale(0.95); border-color: #667eea; }
        .layout-card .site-grid a.drag-over { border-color: #22c55e; border-style: dashed; background: rgba(34,197,94,0.1); transform: translateY(-2px); }
        .layout-card .site-grid a img { width: 36px; height: 36px; border-radius: 9px; object-fit: cover; background: rgba(255,255,255,0.08); pointer-events: none; }
        .layout-card .site-grid a .site-name { font-size: 12px; text-align: center; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }

        /* ===== 条目模式 ===== */
        .layout-list .category { margin-bottom: 4px; background: transparent; border: none; border-radius: 0; padding: 0; backdrop-filter: none; }
        .layout-list .category:hover { background: transparent; border: none; }
        .layout-list .category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0; padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; user-select: none; transition: background 0.2s; }
        .layout-list .category-header:hover { background: rgba(255,255,255,0.03); }
        .layout-list .category-header .icon { font-size: 16px; width: 24px; text-align: center; }
        .layout-list .category-header h2 { font-size: 15px; font-weight: 500; color: #a8a8cc; }
        .layout-list .category-header .count { font-size: 12px; color: #555; margin-left: auto; }
        .layout-list .category-header .collapse-icon { font-size: 12px; color: #555; margin-left: 8px; transition: transform 0.2s; }
        .layout-list .category-header.collapsed .collapse-icon { transform: rotate(-90deg); }
        .layout-list .site-grid { display: flex; flex-wrap: wrap; gap: 2px 0; padding: 4px 16px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .layout-list .site-grid.collapsed { display: none; }
        .layout-list .site-grid a { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; text-decoration: none; color: #bbb; font-size: 13px; transition: all 0.15s; cursor: grab; user-select: none; white-space: nowrap; }
        .layout-list .site-grid a:active { cursor: grabbing; }
        .layout-list .site-grid a:hover { background: rgba(102,126,234,0.1); border-radius: 6px; color: #fff; }
        .layout-list .site-grid a.dragging { opacity: 0.4; }
        .layout-list .site-grid a.drag-over { background: rgba(34,197,94,0.15); border-radius: 6px; }
        .layout-list .site-grid a img { width: 16px; height: 16px; border-radius: 4px; object-fit: cover; pointer-events: none; flex-shrink: 0; }
        .layout-list .site-grid a .site-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ===== 布局切换按钮 ===== */
        .layout-toggle { position: fixed; bottom: 76px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 6px; }
        .layout-toggle button { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(15,12,41,0.8); backdrop-filter: blur(8px); color: #aaa; font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .layout-toggle button:hover { color: #fff; border-color: rgba(102,126,234,0.5); background: rgba(102,126,234,0.2); }
        .layout-toggle button.active { color: #667eea; border-color: #667eea; background: rgba(102,126,234,0.15); box-shadow: 0 0 12px rgba(102,126,234,0.2); }

        .footer { text-align: center; padding: 30px 0 20px; color: #555; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        .footer a { color: #667eea; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(102,126,234,0.3); border: 1px solid rgba(102,126,234,0.4); color: #ccc; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; backdrop-filter: blur(8px); text-decoration: none; transition: all 0.2s; z-index: 100; }
        .admin-btn:hover { background: rgba(102,126,234,0.5); color: #fff; transform: scale(1.1); }

        .loading { text-align: center; padding: 100px 0; color: #8888aa; font-size: 16px; }
        .loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .search-section h1 { font-size: 28px; }
            .search-section { padding: 30px 10px 20px; }
            .search-box { flex-wrap: wrap; border-radius: 20px; }
            .search-box select { width: 100%; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .layout-card .site-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
            .layout-card .site-grid a { padding: 10px 6px; }
            .layout-card .site-grid a img { width: 30px; height: 30px; }
            .layout-card .category { padding: 14px; }
            .layout-list .site-grid { padding: 4px 10px 8px; }
            .layout-list .site-grid a { padding: 5px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="bg-stars"></div>
<div class="container">
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>加载中...</div>
    </div>
    <div id="content" style="display:none">
        <div class="layout-toggle" id="layoutToggle">
            <button class="active" data-layout="card" title="卡片模式" onclick="setLayout('card')">📇</button>
            <button data-layout="list" title="条目模式" onclick="setLayout('list')">📋</button>
        </div>
        <div class="search-section">
            <img id="siteLogo" class="logo-img" style="display:none">
            <h1 id="siteTitle">🏠 东白湖之家</h1>
            <p id="siteSubtitle">上网从这里开始 · 收录精品网站</p>
            <div class="search-box">
                <select id="searchEngine"></select>
                <input type="text" id="searchInput" placeholder="搜索你想要的..." autofocus>
                <button onclick="doSearch()">🔍 搜索</button>
            </div>
            <div class="quick-links" id="quickLinks"></div>
        </div>
        <div class="categories" id="categories"></div>
        <div class="footer">
            <p id="footerText">🏠 东白湖之家 · 上网从这里开始</p>
            <p id="footerICP"></p>
            <p><a href="https://blog.dbhzj.top">东白湖之家</a> · <a href="https://blog.dbhzj.top">blog.dbhzj.top</a></p>
        </div>
    </div>
</div>
<a href="/admin.html" class="admin-btn" title="后台管理">⚙️</a>

<script>
const API = '/api';
let data = null;
let config = null;

async function loadAll() {
    try {
        const [dataRes, configRes] = await Promise.all([
            fetch(API + '/data'),
            fetch(API + '/config')
        ]);
        data = await dataRes.json();
        config = await configRes.json();
        // 迁移：为没有 order 的站点自动生成序号
        if (data && data.categories) {
            let needsSave = false;
            data.categories.forEach(cat => {
                const hasOrder = cat.sites.some(s => s.order !== undefined);
                if (!hasOrder && cat.sites.length > 0) {
                    cat.sites.forEach((s, idx) => { s.order = idx + 1; });
                    needsSave = true;
                }
            });
            if (needsSave) {
                fetch(API + '/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(e => {});
            }
        }
        applyConfig();
        // 初始应用保存的布局偏好（body类 + 按钮高亮，但不重复 render）
        currentLayout = localStorage.getItem('navLayout') || 'card';
        document.body.classList.add('layout-' + currentLayout);
        document.querySelectorAll('#layoutToggle button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.layout === currentLayout);
        });
        render();
    } catch(e) {
        document.getElementById('loading').innerHTML = '❌ 加载数据失败，请稍后重试';
    }
}

function applyConfig() {
    if (!config) return;

    // 背景
    const body = document.body;
    if (config.bg_type === 'image') {
        if (config.site_background) {
            const isMobile = window.innerWidth <= 768;
            const bgUrl = isMobile && config.site_background_mobile ? config.site_background_mobile : config.site_background;
            body.style.background = `url(${bgUrl}) center/cover fixed no-repeat`;
            document.querySelector('.bg-stars').style.display = 'none';
        }
    } else if (config.bg_type === 'color') {
        body.style.background = config.bg_color || '#0f0c29';
        document.querySelector('.bg-stars').style.display = 'none';
    } else {
        // gradient (default)
        body.style.background = config.bg_gradient || 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)';
    }

    // 强调色
    const accent = config.accent_color || '#667eea';
    const styleSheet = document.getElementById('dynamicStyles');
    if (styleSheet) {
        let css = styleSheet.textContent;
        // 替换强调色相关
        css = css.replace(/#667eea/g, accent);
        styleSheet.textContent = css;
    }

    // 自定义 CSS
    if (config.site_custom_css) {
        const customStyle = document.createElement('style');
        customStyle.textContent = config.site_custom_css;
        document.head.appendChild(customStyle);
    }
}

function render() {
    if (!data) return;

    // Logo
    if (config && config.site_logo) {
        const logoImg = document.getElementById('siteLogo');
        logoImg.src = config.site_logo;
        logoImg.style.display = 'inline';
        // 隐藏标题
        document.getElementById('siteTitle').style.display = 'none';
    }

    document.getElementById('siteTitle').textContent = config?.site_title || data.site.title;
    document.getElementById('siteSubtitle').textContent = config?.site_subtitle || data.site.subtitle;
    document.getElementById('footerText').textContent = config?.site_footer || data.site.footer;
    document.getElementById('footerICP').textContent = config?.site_icp || '';

    // 搜索引擎
    const sel = document.getElementById('searchEngine');
    sel.innerHTML = data.searchEngines.map((e, i) =>
        `<option value="${e.url}" ${i===1?'selected':''}>${e.name}</option>`
    ).join('');

    // 快捷链接
    document.getElementById('quickLinks').innerHTML = data.quickLinks.map(l =>
        `<a href="${l.url}" target="_blank"><img src="${l.icon}" onerror="this.style.display='none'" loading="lazy"><span>${l.name}</span></a>`
    ).join('');

        // 分类 - 按 catOrder 排序展示
        const categoriesContainer = document.getElementById('categories');
        const sortedCats = [...data.categories]
            .sort((a, b) => (a.catOrder ?? 999) - (b.catOrder ?? 999));

        if (currentLayout === 'list') {
            // === 条目模式：分类变条形 ===
            categoriesContainer.innerHTML = sortedCats.map((c, ci) => {
                const sortedSites = [...c.sites].sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
                return `<div class="category">
                    <div class="category-header" onclick="toggleCategoryCollapse(this)">
                        <span class="icon">${c.icon}</span>
                        <h2>${c.name}</h2>
                        <span class="count">${c.sites.length}个站点</span>
                        <span class="collapse-icon">▼</span>
                    </div>
                    <div class="site-grid" data-cat-index="${ci}">
                        ${sortedSites.map((s, si) =>
                            `<a href="${s.url}" target="_blank" draggable="true" data-cat-index="${ci}" data-site-index="${si}"
                                ondragstart="onDragStart(event, ${ci}, ${si})"
                                ondragover="onDragOver(event)"
                                ondragenter="onDragEnter(event)"
                                ondragleave="onDragLeave(event)"
                                ondrop="onDrop(event, ${ci}, ${si})"
                                ondragend="onDragEnd(event)">
                                <img src="${s.icon}" onerror="this.style.display='none'" loading="lazy">
                                <span class="site-name">${s.name}</span>
                            </a>`
                        ).join('')}
                    </div>
                </div>`;
            }).join('');
        } else {
            // === 卡片模式（默认） ===
            categoriesContainer.innerHTML = sortedCats.map((c, ci) => {
                const sortedSites = [...c.sites].sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
                return `<div class="category">
                        <div class="category-header">
                            <span class="icon">${c.icon}</span>
                            <h2>${c.name}</h2>
                            <span class="count">${c.sites.length}个站点</span>
                        </div>
                        <div class="site-grid" data-cat-index="${ci}">
                            ${sortedSites.map((s, si) =>
                                `<a href="${s.url}" target="_blank" draggable="true" data-cat-index="${ci}" data-site-index="${si}"
                                    ondragstart="onDragStart(event, ${ci}, ${si})"
                                    ondragover="onDragOver(event)"
                                    ondragenter="onDragEnter(event)"
                                    ondragleave="onDragLeave(event)"
                                    ondrop="onDrop(event, ${ci}, ${si})"
                                    ondragend="onDragEnd(event)">
                                    <img src="${s.icon}" onerror="this.style.display='none'" loading="lazy">
                                    <span class="site-name">${s.name}</span>
                                </a>`
                            ).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

function doSearch() {
    const engine = document.getElementById('searchEngine').value;
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    window.open(engine + encodeURIComponent(query), '_blank');
}
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
});

loadAll();

// ===== 布局切换 =====
let currentLayout = localStorage.getItem('navLayout') || 'card';

function setLayout(layout) {
    currentLayout = layout;
    localStorage.setItem('navLayout', layout);
    // 切换 body 类
    document.body.classList.remove('layout-card', 'layout-list');
    document.body.classList.add('layout-' + layout);
    // 更新按钮高亮
    document.querySelectorAll('#layoutToggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.layout === layout);
    });
    // 重新渲染（让折叠状态重建）
    render();
}

function toggleCategoryCollapse(headerEl) {
    if (currentLayout !== 'list') return;
    const grid = headerEl.parentElement.querySelector('.site-grid');
    if (!grid) return;
    grid.classList.toggle('collapsed');
    headerEl.classList.toggle('collapsed');
}

// ===== 拖拽排序 =====
let dragSrcData = null;

function onDragStart(e, ci, si) {
    dragSrcData = { ci, si };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', `${ci}-${si}`);
    // 添加拖拽中样式
    setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
    e.preventDefault();
    const target = e.target.closest('a');
    if (target && !target.classList.contains('dragging')) {
        target.classList.add('drag-over');
    }
}

function onDragLeave(e) {
    const target = e.target.closest('a');
    if (target) {
        target.classList.remove('drag-over');
    }
}

function onDragEnd(e) {
    // 清除所有样式
    document.querySelectorAll('.site-grid a').forEach(a => {
        a.classList.remove('dragging', 'drag-over');
    });
    dragSrcData = null;
}

async function onDrop(e, ci, si) {
    e.preventDefault();
    const target = e.target.closest('a');
    if (target) target.classList.remove('drag-over');

    if (!dragSrcData) return;
    const { ci: srcCi, si: srcSi } = dragSrcData;

    // 同一个分类才允许排序
    if (srcCi !== ci || srcSi === si) return;

    const cat = data.categories[ci];
    const [moved] = cat.sites.splice(srcSi, 1);
    // 如果拖拽目标在源之后，插入位置要减1（因为源已被移除）
    const insertAt = si > srcSi ? si - 1 : si;
    cat.sites.splice(insertAt, 0, moved);

    // 重新计算序号，使 order 与位置一致
    cat.sites.forEach((s, idx) => { s.order = idx + 1; });

    // 重新渲染
    render();

    // 持久保存到服务器
    try {
        await fetch(API + '/data/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categoryIndex: ci, sites: cat.sites })
        });
    } catch(err) {
        console.error('保存排序失败:', err);
    }
}
</script>
</body>
</html>
