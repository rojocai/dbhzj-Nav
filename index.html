    <style id="dynamicStyles">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            color: #e0e0e0;

        }
        .bg-stars {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;

        }
        .bg-stars::before {
            content: '';

                radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.08), transparent);

        .search-section { text-align: center; padding: 50px 20px 30px; }

        .search-section h1 { font-size: 42px; font-weight: 700; background: linear-gradient(90deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; letter-spacing: 2px; }
        .search-section p { font-size: 14px; color: #8888aa; margin-bottom: 25px; }
        .search-box { display: inline-flex; max-width: 600px; width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; overflow: hidden; backdrop-filter: blur(10px); transition: all 0.3s; }
        .search-box:focus-within { border-color: #667eea; box-shadow: 0 0 20px rgba(102,126,234,0.3); background: rgba(255,255,255,0.12); }
        .search-box select { background: transparent; border: none; color: #aaa; padding: 0 10px 0 18px; font-size: 14px; outline: none; cursor: pointer; min-width: 85px; }

        .layout-card .category { margin-bottom: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px 24px; backdrop-filter: blur(8px); transition: all 0.3s; }

<script>
const API = '/api';
let data = null;
let config = null;

async function loadAll() {
    try {
        const [dataRes, configRes] = await Promise.all([
            fetch(API + '/data'),
            fetch(API + '/config')
        ]);
        data = await dataRes.json();
        config = await configRes.json();
        // 迁移：为没有 order 的站点自动生成序号
        if (data && data.categories) {
            let needsSave = false;
            data.categories.forEach(cat => {
                const hasOrder = cat.sites.some(s => s.order !== undefined);
                if (!hasOrder && cat.sites.length > 0) {
                    cat.sites.forEach((s, idx) => { s.order = idx + 1; });
                    needsSave = true;
                }
            });
            if (needsSave) {
                fetch(API + '/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(e => {});
            }
        }
        // 迁移：为搜索引擎添加 order 字段
        if (data && data.searchEngines) {
            let needsSave = false;
            data.searchEngines.forEach((e, idx) => {
                if (e.order === undefined) { e.order = idx + 1; needsSave = true; }
            });
            if (needsSave) {
                fetch(API + '/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(e => {});
            }
        }
        // 迁移：为快捷链接添加 order 字段
        if (data && data.quickLinks) {
            let needsSave = false;
            data.quickLinks.forEach((l, idx) => {
                if (l.order === undefined) { l.order = idx + 1; needsSave = true; }
            });
            if (needsSave) {
                fetch(API + '/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(e => {});
            }
        }
        applyConfig();
        // 初始应用保存的布局偏好（body类 + 按钮高亮，但不重复 render）
        currentLayout = localStorage.getItem('navLayout') || 'card';
        document.body.classList.add('layout-' + currentLayout);
        document.querySelectorAll('#layoutToggle button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.layout === currentLayout);
        });
        render();
    } catch(e) {
        document.getElementById('loading').innerHTML = '❌ 加载数据失败，请稍后重试';
    }
}

// ===== 字体加载工具 =====
const FONT_LOADED = new Set();

function loadGoogleFont(fontName) {
    if (!fontName || FONT_LOADED.has(fontName)) return;
    // 系统内置字体无需加载
    const systemFonts = ['PingFang SC', 'Microsoft YaHei', 'Georgia', 'Times New Roman', 'Arial', 'Helvetica', 'Verdana', 'Trebuchet MS', 'Courier New', 'Impact', 'Comic Sans MS', 'Palatino Linotype'];
    if (systemFonts.includes(fontName)) { FONT_LOADED.add(fontName); return; }

    const googleMap = {
        'Noto Sans SC': 'Noto+Sans+SC:wght@400;700',
        'Noto Serif SC': 'Noto+Serif+SC:wght@400;700',
        'ZCOOL XiaoWei': 'ZCOOL+XiaoWei',
        'Ma Shan Zheng': 'Ma+Shan+Zheng',
        'Liu Jian Mao Cao': 'Liu+Jian+Mao+Cao',
        'ZCOOL QingKe HuangYou': 'ZCOOL+QingKe+HuangYou',
        'Long Cang': 'Long+Cang',
        'ZCOOL KuaiLe': 'ZCOOL+KuaiLe',
        'LXGW WenKai': 'LXGW+WenKai'
    };
    const gf = googleMap[fontName];
    if (!gf) { FONT_LOADED.add(fontName); return; }
    FONT_LOADED.add(fontName);
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=' + gf + '&display=swap';
    document.head.appendChild(link);
}

// 字体名 → 中文标注/显示用
const FONT_LABELS = {};

function ensureFontsLoaded(config) {
    if (!config) return;
    ['site_title_font', 'site_subtitle_font', 'site_footer_font', 'logo_text_font'].forEach(key => {
        const font = config[key];
        if (font && font !== 'none') loadGoogleFont(font);
    });
}

function applyConfig() {
    if (!config) return;

    // 确保所有字体已加载
    ensureFontsLoaded(config);

    // 背景
    const body = document.body;
    if (config.bg_type === 'image') {
        if (config.site_background) {
            const isMobile = window.innerWidth <= 768;
            const bgUrl = isMobile && config.site_background_mobile ? config.site_background_mobile : config.site_background;
            body.style.background = `url(${bgUrl}) center/cover fixed no-repeat`;
            document.querySelector('.bg-stars').style.display = 'none';
        }
    } else if (config.bg_type === 'color') {
        body.style.background = config.bg_color || '#0f0c29';
        document.querySelector('.bg-stars').style.display = 'none';
    } else {
        // gradient (default)
        body.style.background = config.bg_gradient || 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)';
    }

    // 同步搜索引擎下拉列表背景色 — 注入样式覆盖 option 背景
    let optionBg = '#0f0c29';
    if (config.bg_type === 'color') {
        optionBg = config.bg_color || optionBg;
    } else if (config.bg_type === 'gradient' && config.bg_gradient) {
        const colors = config.bg_gradient.match(/#[a-fA-F0-9]{6}|#[a-fA-F0-9]{3}/g);
        optionBg = (colors && colors.length > 1) ? colors[1] : (colors ? colors[0] : optionBg);
    } else if (config.bg_type === 'image') {
        optionBg = config.bg_color || optionBg;
    }
    // 用 style 标签确保最高优先级覆盖
    let optStyle = document.getElementById('searchOptionStyle');
    if (!optStyle) {
        optStyle = document.createElement('style');
        optStyle.id = 'searchOptionStyle';
        document.head.appendChild(optStyle);
    }
    optStyle.textContent = `#searchEngine { background: ${optionBg} !important; } .search-box select option { background: ${optionBg} !important; color: #e0e0e0 !important; }`;
    // 同步设置内联样式（后备方案）
    const sel = document.getElementById('searchEngine');
    if (sel) sel.style.background = optionBg;

    // 强调色
    const accent = config.accent_color || '#667eea';
    const styleSheet = document.getElementById('dynamicStyles');
    if (styleSheet) {
        let css = styleSheet.textContent;
        // 替换强调色相关
        css = css.replace(/#667eea/g, accent);
        styleSheet.textContent = css;
    }

    // 自定义 CSS
    if (config.site_custom_css) {
        const customStyle = document.createElement('style');
        customStyle.textContent = config.site_custom_css;
        document.head.appendChild(customStyle);
    }
}

// ===== 文字特效辅助函数 =====
function applyTextStyle(el, config, prefix) {
    if (!el || !config) return;
    const font = config[prefix + '_font'];
    const size = config[prefix + '_size'];
    const color = config[prefix + '_color'];
    const opacity = config[prefix + '_opacity'];
    const effect = config[prefix + '_effect'];

    const style = {};
    if (font) style.fontFamily = `"${font}", sans-serif`;
    if (size) style.fontSize = size + 'px';
    if (color) style.color = color;
    if (opacity !== undefined && opacity !== null) style.opacity = opacity;

    Object.assign(el.style, style);

    // 移除旧特效类
    el.className.split(' ').filter(c => c.startsWith('effect-')).forEach(c => el.classList.remove(c));
    if (effect && effect !== 'none') {
        el.classList.add('effect-' + effect);
    }
    // 有效果时移除渐变（否则动画可能看不到）
    if (effect && effect !== 'none') {
        el.style.background = 'none';
        el.style.webkitTextFillColor = 'unset';
        el.style.backgroundClip = 'unset';
        el.style.webkitBackgroundClip = 'unset';
    }
}

function render() {
    if (!data) return;

    // ---- Logo 区域 ----
    const logoArea = document.getElementById('logoArea');
    const logoImg = document.getElementById('siteLogo');
    const titleContainer = document.getElementById('siteTitleContainer');
    const siteTitleEl = document.getElementById('siteTitle');

    // 布局方向
    logoArea.classList.remove('vertical');
    if (config?.logo_layout === 'vertical') {
        logoArea.classList.add('vertical');
    }

    const logoMode = config?.logo_mode || 'logo_text';
    const logoW = config?.logo_width_pct || 50;
    const logoH = config?.logo_height_pct || 50;
    const scaleMode = config?.logo_scale_mode;
    // scaleMode: true=等比例, false=自由缩放
    const isAspectLock = scaleMode === true || scaleMode === 'aspect_keep' || scaleMode === undefined || scaleMode === null;

    if (logoMode === 'logo_image' && config?.site_logo) {
        // 图片Logo模式
        logoImg.src = config.site_logo;
        logoImg.style.display = 'inline';
        // 使用百分比计算实际尺寸
        logoImg.style.maxWidth = logoW + '%';
        logoImg.style.width = '';
        if (isAspectLock) {
            logoImg.style.height = 'auto';
        } else {
            logoImg.style.height = logoH + '%';
            logoImg.style.objectFit = 'contain';
        }
        logoImg.style.objectPosition = 'center';
        // 旋转
        if (config?.logo_rotate) {
            logoImg.style.transform = 'rotate(' + config.logo_rotate + 'deg)';
        } else {
            logoImg.style.transform = '';
        }
        // Logo 透明度
        if (config?.logo_opacity !== undefined && config.logo_opacity !== null) {
            logoImg.style.opacity = config.logo_opacity;
        }
        // Logo 特效（只对image有效果类适用）
        if (config?.logo_image_effect && config.logo_image_effect !== 'none') {
            logoImg.classList.add('effect-' + config.logo_image_effect);
        }
        siteTitleEl.style.display = 'none';
    } else if (logoMode === 'logo_text' && config?.logo_text) {
        // 文字Logo模式（保留旧兼容）
        logoImg.style.display = 'none';
        siteTitleEl.style.display = 'block';
        siteTitleEl.textContent = config.logo_text;
        siteTitleEl.style.fontSize = '48px';
        applyTextStyle(siteTitleEl, config, 'logo_text');
        siteTitleEl.style.background = 'none';
        siteTitleEl.style.webkitTextFillColor = 'unset';
        siteTitleEl.style.backgroundClip = 'unset';
        siteTitleEl.style.webkitBackgroundClip = 'unset';
    } else {
        // 默认：文字标题（用site_title字段 + 样式）
        logoImg.style.display = 'none';
        siteTitleEl.style.display = 'block';
        siteTitleEl.textContent = config?.site_title || data.site.title;
        
        // 判断用户是否自定义了样式（字体、颜色、特效）
        const hasCustomFont = !!config?.site_title_font;
        const hasCustomColor = !!config?.site_title_color;
        const hasCustomEffect = config?.site_title_effect && config.site_title_effect !== 'none';
        const hasCustomStyle = hasCustomFont || hasCustomColor || hasCustomEffect;
        
        if (hasCustomStyle) {
            // 先重置所有渐变相关，让applyTextStyle从干净状态开始
            siteTitleEl.style.background = '';
            siteTitleEl.style.webkitBackgroundClip = '';
            siteTitleEl.style.webkitTextFillColor = '';
            siteTitleEl.style.backgroundClip = '';
            siteTitleEl.style.fontSize = '';
            siteTitleEl.style.fontFamily = '';
            siteTitleEl.style.opacity = '';
            
            if (hasCustomEffect) {
                // 有效果时不使用渐变（避免动画被覆盖）
                applyTextStyle(siteTitleEl, config, 'site_title');
                siteTitleEl.style.background = 'none';
                siteTitleEl.style.webkitTextFillColor = 'unset';
            } else if (hasCustomColor && !hasCustomFont) {
                // 只有颜色：纯色显示
                applyTextStyle(siteTitleEl, config, 'site_title');
                siteTitleEl.style.background = 'none';
                siteTitleEl.style.webkitTextFillColor = 'unset';
                siteTitleEl.style.backgroundClip = 'unset';
                siteTitleEl.style.webkitBackgroundClip = 'unset';
            } else if (hasCustomFont && !hasCustomColor && !hasCustomEffect) {
                // 只选了字体：保留渐变色 + 应用字体
                applyTextStyle(siteTitleEl, config, 'site_title');
                // 重新覆盖颜色为渐变（保留字体设置）
                siteTitleEl.style.background = 'linear-gradient(90deg, #667eea, #764ba2, #f093fb)';
                siteTitleEl.style.webkitBackgroundClip = 'text';
                siteTitleEl.style.webkitTextFillColor = 'transparent';
                siteTitleEl.style.backgroundClip = 'text';
            } else {
                // 字体+颜色，或只有颜色：纯色显示
                applyTextStyle(siteTitleEl, config, 'site_title');
                siteTitleEl.style.background = 'none';
                siteTitleEl.style.webkitTextFillColor = 'unset';
                siteTitleEl.style.backgroundClip = 'unset';
                siteTitleEl.style.webkitBackgroundClip = 'unset';
            }
        } else {
            // 无自定义样式：使用默认渐变
            siteTitleEl.style.background = 'linear-gradient(90deg, #667eea, #764ba2, #f093fb)';
            siteTitleEl.style.webkitBackgroundClip = 'text';
            siteTitleEl.style.webkitTextFillColor = 'transparent';
            siteTitleEl.style.backgroundClip = 'text';
            siteTitleEl.style.fontSize = '';
            siteTitleEl.style.fontFamily = '';
            siteTitleEl.style.opacity = '';
            applyTextStyle(siteTitleEl, config, 'site_title');
        }
    }

    // ---- 标题样式（文字标题模式时应用site_title样式） ----
    if (logoMode === 'logo_text' && config?.logo_text) {
        // 文字Logo已应用 logo_text 样式，不做额外处理
    } else {
        // 使用site_title样式 - 文字标题模式
        // 注意：上面的hasCustomStyle已做了完整处理，此处不再重复覆盖
        // 只对无特效的情况补充未处理的逻辑
    }

    // ---- 副标题 ----
    const subtitleEl = document.getElementById('siteSubtitle');
    subtitleEl.textContent = config?.site_subtitle || data.site.subtitle;
    applyTextStyle(subtitleEl, config, 'site_subtitle');

    // ---- 底部文字 ----
    const footerTextEl = document.getElementById('footerText');
    footerTextEl.textContent = config?.site_footer || data.site.footer;
    applyTextStyle(footerTextEl, config, 'site_footer');
    document.getElementById('footerICP').textContent = config?.site_icp || '';

    // 搜索引擎 - 按 order 排序
    const sortedEngines = [...data.searchEngines]
        .sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
    const sel = document.getElementById('searchEngine');
    sel.innerHTML = sortedEngines.map((e, i) =>
        `<option value="${e.url}" ${i===1?'selected':''}>${e.name}</option>`
    ).join('');

    // 快捷链接 - 按 order 排序
    const sortedQLinks = [...data.quickLinks]
        .sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
    document.getElementById('quickLinks').innerHTML = sortedQLinks.map(l =>
        `<a href="${l.url}" target="_blank"><img src="${l.icon}" onerror="this.style.display='none'" loading="lazy"><span>${l.name}</span></a>`
    ).join('');

        // 分类 - 按 catOrder 排序展示
        const categoriesContainer = document.getElementById('categories');
        const sortedCats = [...data.categories]
            .sort((a, b) => (a.catOrder ?? 999) - (b.catOrder ?? 999));

        if (currentLayout === 'list') {
            // === 条目模式：分类变条形 ===
            categoriesContainer.innerHTML = sortedCats.map((c, ci) => {
                const sortedSites = [...c.sites].sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
                return `<div class="category">
                    <div class="category-header" onclick="toggleCategoryCollapse(this)">
                        <span class="icon">${c.icon}</span>
                        <h2>${c.name}</h2>
                        <span class="count">${c.sites.length}个站点</span>
                        <span class="collapse-icon">▼</span>
                    </div>
                    <div class="site-grid" data-cat-index="${ci}">
                        ${sortedSites.map((s, si) =>
                            `<a href="${s.url}" target="_blank" draggable="true" data-cat-index="${ci}" data-site-index="${si}"
                                ondragstart="onDragStart(event, ${ci}, ${si})"
                                ondragover="onDragOver(event)"
                                ondragenter="onDragEnter(event)"
                                ondragleave="onDragLeave(event)"
                                ondrop="onDrop(event, ${ci}, ${si})"
                                ondragend="onDragEnd(event)">
                                <img src="${s.icon}" onerror="this.style.display='none'" loading="lazy">
                                <span class="site-name">${s.name}</span>
                            </a>`
                        ).join('')}
                    </div>
                </div>`;
            }).join('');
        } else {
            // === 卡片模式（默认） ===
            categoriesContainer.innerHTML = sortedCats.map((c, ci) => {
                const sortedSites = [...c.sites].sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
                return `<div class="category">
                        <div class="category-header">
                            <span class="icon">${c.icon}</span>
                            <h2>${c.name}</h2>
                            <span class="count">${c.sites.length}个站点</span>
                        </div>
                        <div class="site-grid" data-cat-index="${ci}">
                            ${sortedSites.map((s, si) =>
                                `<a href="${s.url}" target="_blank" draggable="true" data-cat-index="${ci}" data-site-index="${si}"
                                    ondragstart="onDragStart(event, ${ci}, ${si})"
                                    ondragover="onDragOver(event)"
                                    ondragenter="onDragEnter(event)"
                                    ondragleave="onDragLeave(event)"
                                    ondrop="onDrop(event, ${ci}, ${si})"
                                    ondragend="onDragEnd(event)">
                                    <img src="${s.icon}" onerror="this.style.display='none'" loading="lazy">
                                    <span class="site-name">${s.name}</span>
                                </a>`
                            ).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

function doSearch() {
    const engine = document.getElementById('searchEngine').value;
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    window.open(engine + encodeURIComponent(query), '_blank');
}
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
});

loadAll();

// ===== 布局切换 =====
let currentLayout = localStorage.getItem('navLayout') || 'card';

function setLayout(layout) {
    currentLayout = layout;
    localStorage.setItem('navLayout', layout);
    // 切换 body 类
    document.body.classList.remove('layout-card', 'layout-list');
    document.body.classList.add('layout-' + layout);
    // 更新按钮高亮
    document.querySelectorAll('#layoutToggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.layout === layout);
    });
    // 重新渲染（让折叠状态重建）
    render();
}

function toggleCategoryCollapse(headerEl) {
    if (currentLayout !== 'list') return;
    const grid = headerEl.parentElement.querySelector('.site-grid');
    if (!grid) return;
    grid.classList.toggle('collapsed');
    headerEl.classList.toggle('collapsed');
}

// ===== 拖拽排序 =====
let dragSrcData = null;

function onDragStart(e, ci, si) {
    dragSrcData = { ci, si };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', `${ci}-${si}`);
    // 添加拖拽中样式
    setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
    e.preventDefault();
    const target = e.target.closest('a');
    if (target && !target.classList.contains('dragging')) {
        target.classList.add('drag-over');
    }
}

function onDragLeave(e) {
    const target = e.target.closest('a');
    if (target) {
        target.classList.remove('drag-over');
    }
}

function onDragEnd(e) {
    // 清除所有样式
    document.querySelectorAll('.site-grid a').forEach(a => {
        a.classList.remove('dragging', 'drag-over');
    });
    dragSrcData = null;
}

async function onDrop(e, ci, si) {
    e.preventDefault();
    const target = e.target.closest('a');
    if (target) target.classList.remove('drag-over');

    if (!dragSrcData) return;
    const { ci: srcCi, si: srcSi } = dragSrcData;

    // 同一个分类才允许排序
    if (srcCi !== ci || srcSi === si) return;

    const cat = data.categories[ci];
    const [moved] = cat.sites.splice(srcSi, 1);
    // 如果拖拽目标在源之后，插入位置要减1（因为源已被移除）
    const insertAt = si > srcSi ? si - 1 : si;
    cat.sites.splice(insertAt, 0, moved);

    // 重新计算序号，使 order 与位置一致
    cat.sites.forEach((s, idx) => { s.order = idx + 1; });

    // 重新渲染
    render();

    // 持久保存到服务器
    try {
        await fetch(API + '/data/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categoryIndex: ci, sites: cat.sites })
        });
    } catch(err) {
        console.error('保存排序失败:', err);
    }
}
</script>
