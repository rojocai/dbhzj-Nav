<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东白湖之家 - 后台管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #0f0c29;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #302b63, #24243e);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 22px; background: linear-gradient(90deg, #667eea, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #999; }
        .header .user-info .username { color: #60a5fa; }
        .header .actions { display: flex; gap: 10px; }
        .header a, .header button {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #ccc;
            transition: all 0.2s;
        }
        .header a:hover, .header button:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .header .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; }
        .header .btn-primary:hover { opacity: 0.85; }
        .header .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); border: none; color: #fff; }
        .header .btn-success:hover { opacity: 0.85; }
        .header .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); border: none; color: #fff; }
        .header .btn-danger:hover { opacity: 0.85; }
        .header .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #999; }
        .header .btn-ghost:hover { background: rgba(255,255,255,0.06); color: #fff; }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .section { margin-bottom: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px 24px; }
        .section-title { font-size: 18px; font-weight: 600; color: #c8c8e8; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: #999; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group select option {
            background: #1e1b3a;
            color: #e0e0e0;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { min-height: 60px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .site-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .site-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .site-item:hover { border-color: rgba(255,255,255,0.12); }
        .site-item .info { flex: 1; }
        .site-item .info .name { font-size: 14px; color: #e0e0e0; }
        .site-item .info .url { font-size: 12px; color: #667eea; }
        .site-item .actions { display: flex; gap: 6px; }
        .site-item .actions button {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #aaa;
            transition: all 0.2s;
        }
        .site-item .actions button:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .site-item .actions .edit-btn { color: #60a5fa; }
        .site-item .actions .del-btn { color: #f87171; }
        .site-item .actions .edit-btn:hover { background: rgba(96,165,250,0.2); }
        .site-item .actions .del-btn:hover { background: rgba(248,113,113,0.2); }

        .category-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .category-card .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .category-card .cat-header input { 
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: #e0e0e0;
            font-size: 16px;
            padding: 4px 8px;
            outline: none;
            flex: 1;
        }
        .category-card .cat-header input:focus { border-color: #667eea; }
        .category-card .cat-header .icon-input { width: 50px; text-align: center; font-size: 20px; }
        .category-card .cat-header .order-input {
            width: 42px; text-align: center; font-size: 14px;
            background: rgba(102,126,234,0.15);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 6px; color: #667eea; font-weight: 600;
            padding: 2px 4px;
        }
        .category-card .cat-header .order-input:focus {
            border-color: #667eea; background: rgba(102,126,234,0.25);
        }
        .category-card .cat-header .cat-actions { display: flex; gap: 6px; }
        .category-card .cat-header .cat-actions button {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .category-card .cat-header .add-site-btn { background: rgba(34,197,94,0.2); color: #22c55e; }
        .category-card .cat-header .add-site-btn:hover { background: rgba(34,197,94,0.3); }
        .category-card .cat-header .del-cat-btn { background: rgba(239,68,68,0.2); color: #f87171; }
        .category-card .cat-header .del-cat-btn:hover { background: rgba(239,68,68,0.3); }

        /* 分类拖拽排序 */
        .category-card.dragging-cat { opacity: 0.35; border-color: #667eea; }
        .category-card.drag-over-cat { border-color: #22c55e; border-style: dashed; background: rgba(34,197,94,0.08); }

        /* 鼠标吸附拖拽通用样式 */
        .dragging-item { opacity: 0.3; border-color: #667eea; }
        .drag-before { border-top: 3px solid #22c55e !important; }
        .drag-after { border-bottom: 3px solid #22c55e !important; }
        .drag-before, .drag-after { position: relative; }
        .drag-before::before {
            content: ''; position: absolute; top: -2px; left: 0; right: 0;
            height: 3px; background: #22c55e; border-radius: 2px;
            box-shadow: 0 0 8px rgba(34,197,94,0.5);
            z-index: 10;
        }
        .drag-after::after {
            content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
            height: 3px; background: #22c55e; border-radius: 2px;
            box-shadow: 0 0 8px rgba(34,197,94,0.5);
            z-index: 10;
        }
        .site-item, .engine-item, .ql-item, .category-card { cursor: pointer; user-select: none; }
        .drag-handle { cursor: grab; color: #555; font-size: 16px; padding: 4px 6px;
            user-select: none; border-radius: 4px; transition: color 0.2s;
            flex-shrink: 0;
        }
        .drag-handle:active { cursor: grabbing; }
        .drag-handle:hover { color: #667eea; }

        /* 搜索引擎和快捷链接拖拽（旧样式保留兼容） */
        .engine-item, .ql-item { cursor: pointer; }
        .engine-item.dragging-item, .ql-item.dragging-item { opacity: 0.35; border-color: #667eea; }
        .engine-item.drag-over-item, .ql-item.drag-over-item { border-color: #22c55e; border-style: dashed; background: rgba(34,197,94,0.08); }
        .site-item .order-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(102,126,234,0.2); color: #667eea;
            font-size: 11px; font-weight: 600; flex-shrink: 0;
        }
        .site-item .item-icon { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .form-hint { font-size: 12px; color: #666; margin-top: 3px; }

        /* Emoji 选择面板 */
        .emoji-picker {
            display: none; flex-wrap: wrap; gap: 4px; margin-top: 6px;
            padding: 8px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
            max-height: 160px; overflow-y: auto;
        }
        .emoji-picker.open { display: flex; }
        .emoji-picker span {
            width: 32px; height: 32px; display: flex; align-items: center;
            justify-content: center; font-size: 18px; border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .emoji-picker span:hover { background: rgba(102,126,234,0.3); transform: scale(1.2); }
        .emoji-btn {
            padding: 4px 10px; border-radius: 6px; font-size: 12px;
            cursor: pointer; border: none; background: rgba(96,165,250,0.2);
            color: #60a5fa; transition: all 0.2s;
        }
        .emoji-btn:hover { background: rgba(96,165,250,0.3); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .toast.success { background: rgba(34,197,94,0.85); }
        .toast.error { background: rgba(239,68,68,0.85); }
        .toast.info { background: rgba(96,165,250,0.85); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .empty-state { text-align: center; padding: 30px; color: #666; font-size: 14px; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1e1b3a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 { font-size: 18px; margin-bottom: 16px; color: #c8c8e8; }
        .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .modal .modal-actions button { padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
        .modal .modal-actions .btn-cancel { background: rgba(255,255,255,0.08); color: #aaa; }
        .modal .modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.15); }
        .modal .modal-actions .btn-confirm { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .modal .modal-actions .btn-confirm:hover { opacity: 0.85; }

        .site-edit-form .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .radio-card {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #aaa;
        }
        .radio-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: #e0e0e0; }
        .radio-card input { display: none; }
        .radio-card.active { background: rgba(102,126,234,0.15); border-color: #667eea; color: #fff; }

        .gradient-preset, .color-preset {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
        }
        .gradient-preset:hover, .color-preset:hover {
            border-color: #667eea;
            transform: scale(1.15);
        }
        .gradient-preset.active, .color-preset.active {
            border-color: #fff;
            box-shadow: 0 0 8px rgba(102,126,234,0.5);
        }
        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: 2px solid #fff;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; }

        .style-toggle {
            cursor: pointer;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            font-size: 13px;
            color: #888;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            user-select: none;
        }
        .style-toggle:hover {
            background: rgba(255,255,255,0.06);
            color: #aaa;
            border-color: rgba(255,255,255,0.12);
        }
        .style-toggle.open { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.08); }
        .style-panel {
            display: none;
            margin-top: 10px;
            padding: 14px;
            background: rgba(42,42,58,0.9);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
        }
        .style-panel.open { display: block; }
        .style-panel .form-row { grid-template-columns: 1fr 1fr; }
        .icon-sync-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .icon-sync-group input[type="color"] {
            width: 40px; height: 36px; padding: 2px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; cursor: pointer;
            background: transparent;
        }
        .opacity-display {
            font-size: 13px; color: #888; min-width: 36px;
        }

        @keyframes fadeEffect { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-20px);} }
        @keyframes heartbeat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
        @keyframes rotate3d { 0%{transform:rotateY(0deg);} 50%{transform:rotateY(180deg);} 100%{transform:rotateY(360deg);} }
        @keyframes glow { 0%,100%{box-shadow:0 0 5px #667eea;} 50%{box-shadow:0 0 30px #667eea,0 0 60px #667eea;} }
        @keyframes inkblot { 0%,100%{filter:blur(0px);opacity:1;} 50%{filter:blur(3px);opacity:0.6;} }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.7;transform:scale(1.05);} }
        @keyframes typing { from { width: 0; } to { width: 100%; } }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>🏠 东白湖之家 - 后台管理</h1>
    <div class="user-info" id="userInfo" style="display:none">
        <span>👤 <span class="username" id="currentUser"></span></span>
        <button onclick="showChangePassword()" class="btn-ghost" style="padding:4px 12px;font-size:12px;">🔑 修改密码</button>
        <button onclick="logout()" class="btn-ghost" style="padding:4px 12px;font-size:12px;color:#f87171;">🚪 退出</button>
    </div>
    <div class="actions">
        <button onclick="saveData()" class="btn-success" id="saveBtn">💾 保存</button>
        <a href="/" target="_blank">🔗 查看导航</a>
    </div>
</div>

<div id="toastContainer"></div>
<div id="modalOverlay" class="modal-overlay"><div class="modal" id="modalContent"></div></div>

<!-- 登录页面 -->
<div id="loginPage">
    <div style="max-width:400px;margin:120px auto;padding:40px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;text-align:center;">
        <div style="font-size:48px;margin-bottom:16px;">🔐</div>
        <h2 style="font-size:24px;margin-bottom:8px;color:#c8c8e8;">后台登录</h2>
        <p style="font-size:13px;color:#666;margin-bottom:28px;">请输入管理员账号密码</p>
        <div class="form-group"><label>用户名</label><input id="loginUsername" placeholder="admin" value="admin"></div>
        <div class="form-group"><label>密码</label><input id="loginPassword" type="password" placeholder="admin123" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button onclick="doLogin()" class="btn-primary" style="width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;">登 录</button>
        <div id="loginError" style="color:#f87171;font-size:13px;margin-top:12px;display:none;"></div>
    </div>
</div>

<!-- 管理内容 -->
<div id="adminContent" style="display:none">
<div class="container">
    <!-- 基本设置 -->
    <div class="section">
        <div class="section-title">📝 基本设置</div>
        <div class="form-row">
            <div class="form-group">
                <label>网站标题</label>
                <input id="siteTitle" placeholder="东白湖之家">
                <div style="margin-top:8px;">
                    <label style="font-size:13px;color:#999;margin-bottom:6px;display:block;">标题展示方式</label>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
                        <label class="radio-card" data-value="logo_text" onclick="onTitleModeChange('logo_text')">
                            <input type="radio" name="titleMode" value="logo_text">
                            <span>✏️ 文字模式</span>
                        </label>
                        <label class="radio-card" data-value="logo_image" onclick="onTitleModeChange('logo_image')">
                            <input type="radio" name="titleMode" value="logo_image">
                            <span>🖼️ 图片模式</span>
                        </label>
                    </div>
                </div>
                <!-- 文字模式区域 -->
                <div id="titleTextModeArea">
                    <div class="style-toggle" onclick="toggleStylePanel('titleStylePanel', this)">
                        🎨 文字样式设置 ▾
                    </div>
                    <div class="style-panel" id="titleStylePanel">
                        <div class="form-row" style="margin-bottom:12px;">
                            <div class="form-group">
                                <label>字体</label>
                                <select id="siteTitleFont" onchange="updateFontPreview('siteTitle')">
                                    <option value="">默认字体</option>
                                    <!-- 中文字体 -->
                                    <option value="PingFang SC">PingFang SC（苹方）</option>
                                    <option value="Microsoft YaHei">Microsoft YaHei（微软雅黑）</option>
                                    <option value="Noto Sans SC">Noto Sans SC（思源黑体）</option>
                                    <option value="Noto Serif SC">Noto Serif SC（思源宋体）</option>
                                    <option value="ZCOOL XiaoWei">ZCOOL XiaoWei（站酷小魏）</option>
                                    <option value="Ma Shan Zheng">Ma Shan Zheng（马善政楷书）</option>
                                    <option value="Liu Jian Mao Cao">Liu Jian Mao Cao（柳建毛草）</option>
                                    <option value="ZCOOL QingKe HuangYou">ZCOOL QingKe HuangYou（站酷晴空）</option>
                                    <option value="Long Cang">Long Cang（龙藏体）</option>
                                    <option value="ZCOOL KuaiLe">ZCOOL KuaiLe（站酷快乐）</option>
                                    <option value="LXGW WenKai">LXGW WenKai（霞鹜文楷）</option>
                                    <!-- 国际字体 -->
                                    <option value="Georgia">Georgia</option>
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Arial">Arial</option>
                                    <option value="Helvetica">Helvetica</option>
                                    <option value="Verdana">Verdana</option>
                                    <option value="Trebuchet MS">Trebuchet MS</option>
                                    <option value="Courier New">Courier New</option>
                                    <option value="Impact">Impact</option>
                                    <option value="Comic Sans MS">Comic Sans MS</option>
                                    <option value="Palatino Linotype">Palatino Linotype</option>
                                </select>
                                <div id="siteTitleFontPreview" style="margin-top:6px;padding:8px 12px;background:#2a2a3a;border:1px solid rgba(255,255,255,0.08);border-radius:6px;font-size:18px;min-height:36px;display:flex;align-items:center;color:#ccc;">
                                    <span style="opacity:0.5;">Aa 字体预览</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>字号 (px)</label>
                                <input id="siteTitleSize" type="number" min="8" max="200" placeholder="36">

<script>
const API = '/api';
let data = null;
let config = null;
let currentUsername = '';

// ===== 登录 =====
async function checkLogin() {
    try {
        const res = await fetch(API + '/verify');
        const result = await res.json();
        if (result.success) {
            currentUsername = result.user.username;
            showAdmin(result.user.username);
        } else {
            showLogin();
        }
    } catch(e) {
        showLogin();
    }
}

function showLogin() {
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('adminContent').style.display = 'none';
}

function showAdmin(username) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('currentUser').textContent = username;
    loadData();
}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errEl = document.getElementById('loginError');
    
    if (!username || !password) {
        errEl.textContent = '请输入用户名和密码';
        errEl.style.display = 'block';
        return;
    }

    try {
        const res = await fetch(API + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const result = await res.json();
        
        if (result.success) {
            errEl.style.display = 'none';
            currentUsername = result.user.username;
            showAdmin(result.user.username);
            toast('登录成功', 'success');
        } else {
            errEl.textContent = result.error || '登录失败';
            errEl.style.display = 'block';
        }
    } catch(e) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
    }
}

async function logout() {
    await fetch(API + '/logout', { method: 'POST' });
    currentUsername = '';
    showLogin();
    toast('已退出登录', 'info');
}

// ===== 修改密码 =====
function showChangePassword() {
    showModal('🔑 修改账号密码', `
        <div class="form-group"><label>新用户名 (留空不修改)</label><input id="cpUsername" value="${esc(currentUsername)}" placeholder="admin"></div>
        <div class="form-group"><label>旧密码</label><input id="cpOldPass" type="password" placeholder="当前密码"></div>
        <div class="form-group"><label>新密码 (至少6位)</label><input id="cpNewPass" type="password" placeholder="新密码"></div>
        <div class="form-group"><label>确认新密码</label><input id="cpConfirmPass" type="password" placeholder="再次输入新密码"></div>
        <p style="font-size:12px;color:#888;margin-top:8px;">修改后需要重新登录</p>
    `, async () => {
        const newUsername = document.getElementById('cpUsername').value.trim();
        const oldPassword = document.getElementById('cpOldPass').value;
        const newPassword = document.getElementById('cpNewPass').value;
        const confirmPassword = document.getElementById('cpConfirmPass').value;

        if (!oldPassword) { toast('请输入旧密码', 'error'); return; }
        if (!newPassword || newPassword.length < 6) { toast('新密码至少6位', 'error'); return; }
        if (newPassword !== confirmPassword) { toast('两次密码不一致', 'error'); return; }

        try {
            const res = await fetch(API + '/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    oldPassword, 
                    newPassword,
                    newUsername: newUsername || undefined
                })
            });
            const result = await res.json();
            
            if (result.success) {
                toast(result.message || '密码修改成功，请重新登录', 'success');
                closeModal();
                setTimeout(() => logout(), 1500);
            } else {
                toast(result.error || '修改失败', 'error');
            }
        } catch(e) {
            toast('网络错误', 'error');
        }
    });
}

// ===== 导航数据 =====
async function loadData() {
    try {
        const [dataRes, configRes] = await Promise.all([
            fetch(API + '/data'),
            fetch(API + '/config')
        ]);
        data = await dataRes.json();
        config = await configRes.json();
        renderAll();
        renderConfig();
        // 等待 DOM 渲染完成后初始化拖拽
        setTimeout(initAllDrag, 50);
    } catch(e) {
        toast('加载数据失败: ' + e.message, 'error');
    }
}

function renderAll() {
    if (!data) return;
    document.getElementById('siteTitle').value = data.site.title || '';
    document.getElementById('siteSubtitle').value = data.site.subtitle || '';
    document.getElementById('siteFooter').value = data.site.footer || '';
    document.getElementById('siteIcp').value = config?.site_icp || '';
    renderEngines();
    renderQuickLinks();
    renderCategories();
}

// ===== 外观设置 =====
function renderConfig() {
    if (!config) return;

    // 背景类型
    const bgType = config.bg_type || 'gradient';
    document.querySelectorAll('input[name="bgType"]').forEach(r => {
        r.checked = (r.value === bgType);
    });
    document.querySelectorAll('.radio-card').forEach(el => {
        const val = el.getAttribute('data-value');
        el.classList.toggle('active', val === bgType);
    });
    onBgTypeChange(bgType);

    // 渐变背景
    document.getElementById('bgGradient').value = config.bg_gradient || '';

    // 图片背景
    document.getElementById('bgImage').value = config.site_background || '';
    document.getElementById('bgImageMobile').value = config.site_background_mobile || '';

    // 纯色背景
    document.getElementById('bgColor').value = config.bg_color || '#0f0c29';
    document.getElementById('bgColorText').value = config.bg_color || '#0f0c29';

    // 标题模式 (logo_text / logo_image)
    const titleMode = config.logo_mode || 'logo_text';
    document.querySelectorAll('input[name="titleMode"]').forEach(r => {
        r.checked = (r.value === titleMode);
    });
    document.querySelectorAll('.radio-card').forEach(el => {
        const v = el.getAttribute('data-value');
        if (v === 'logo_text' || v === 'logo_image') {
            el.classList.toggle('active', v === titleMode);
        }
    });
    onTitleModeChange(titleMode);

    // Logo 图片
    document.getElementById('siteLogo').value = config.site_logo || '';

    // Logo 宽高百分比
    const logoW = config.logo_width_pct || 50;
    const logoH = config.logo_height_pct || 50;
    document.getElementById('logoWidthSlider').value = logoW;
    document.getElementById('logoWidthInput').value = logoW;
    document.getElementById('logoHeightSlider').value = logoH;
    document.getElementById('logoHeightInput').value = logoH;

    // Logo 缩放模式（复选框：true=等比例）
    const scaleMode = config.logo_scale_mode !== undefined ? config.logo_scale_mode : true;
    document.getElementById('logoAspectLock').checked = scaleMode === true || scaleMode === 'aspect_keep';
    onLogoScaleMode(document.getElementById('logoAspectLock').checked);

    // Logo 布局
    const logoLayout = config.logo_layout || 'horizontal';
    document.querySelectorAll('input[name="logoLayout"]').forEach(r => {
        r.checked = (r.value === logoLayout);
    });
    document.querySelectorAll('.radio-card').forEach(el => {
        const v = el.getAttribute('data-value');
        if (v === 'horizontal' || v === 'vertical') {
            el.classList.toggle('active', v === logoLayout);
        }
    });

    updateLogoSizeDisplay();

    // 旋转角度
    const rotate = config.logo_rotate || 0;
    document.getElementById('logoRotateSlider').value = rotate;
    document.getElementById('logoRotateInput').value = rotate;

    // 文字 Logo 字段（兼容旧数据）
    document.getElementById('logoText').value = config.logo_text || '';
    document.getElementById('logoTextFont').value = config.logo_text_font || '';
    document.getElementById('logoTextSize').value = config.logo_text_size || 48;
    document.getElementById('logoTextColor').value = config.logo_text_color || '#ffffff';
    document.getElementById('logoTextColorText').value = config.logo_text_color || '#ffffff';
    document.getElementById('logoTextOpacity').value = config.logo_text_opacity !== undefined ? config.logo_text_opacity : 1;
    document.getElementById('logoTextOpacityValue').textContent = config.logo_text_opacity !== undefined ? Number(config.logo_text_opacity).toFixed(2) : '1.00';
    document.getElementById('logoTextEffect').value = config.logo_text_effect || 'none';
    document.getElementById('logoOpacity').value = config.logo_opacity !== undefined ? config.logo_opacity : 1;
    document.getElementById('logoOpacityValue').textContent = config.logo_opacity !== undefined ? Number(config.logo_opacity).toFixed(2) : '1.00';
    document.getElementById('logoImageEffect').value = config.logo_image_effect || 'none';
    updateEffectPreview('logoImage', config.logo_image_effect || 'none');
    // 标题样式
    document.getElementById('siteTitleFont').value = config.site_title_font || '';
    updateFontPreview('siteTitle');
    document.getElementById('siteTitleSize').value = config.site_title_size || 36;
    document.getElementById('siteTitleColor').value = config.site_title_color || '#ffffff';
    document.getElementById('siteTitleColorText').value = config.site_title_color || '#ffffff';
    document.getElementById('siteTitleOpacity').value = config.site_title_opacity !== undefined ? config.site_title_opacity : 1;
    document.getElementById('siteTitleOpacityValue').textContent = config.site_title_opacity !== undefined ? Number(config.site_title_opacity).toFixed(2) : '1.00';
    document.getElementById('siteTitleEffect').value = config.site_title_effect || 'none';
    updateEffectPreview('siteTitle', config.site_title_effect || 'none');
    // 副标题样式
    document.getElementById('siteSubtitleFont').value = config.site_subtitle_font || '';
    updateFontPreview('siteSubtitle');
    document.getElementById('siteSubtitleSize').value = config.site_subtitle_size || 18;
    document.getElementById('siteSubtitleColor').value = config.site_subtitle_color || '#aaaaaa';
    document.getElementById('siteSubtitleColorText').value = config.site_subtitle_color || '#aaaaaa';
    document.getElementById('siteSubtitleOpacity').value = config.site_subtitle_opacity !== undefined ? config.site_subtitle_opacity : 1;
    document.getElementById('siteSubtitleOpacityValue').textContent = config.site_subtitle_opacity !== undefined ? Number(config.site_subtitle_opacity).toFixed(2) : '1.00';
    document.getElementById('siteSubtitleEffect').value = config.site_subtitle_effect || 'none';
    updateEffectPreview('siteSubtitle', config.site_subtitle_effect || 'none');
    // 底部文字样式
    document.getElementById('siteFooterFont').value = config.site_footer_font || '';
    updateFontPreview('siteFooter');
    document.getElementById('siteFooterSize').value = config.site_footer_size || 14;
    document.getElementById('siteFooterColor').value = config.site_footer_color || '#888888';
    document.getElementById('siteFooterColorText').value = config.site_footer_color || '#888888';
    document.getElementById('siteFooterOpacity').value = config.site_footer_opacity !== undefined ? config.site_footer_opacity : 1;
    document.getElementById('siteFooterOpacityValue').textContent = config.site_footer_opacity !== undefined ? Number(config.site_footer_opacity).toFixed(2) : '1.00';
    document.getElementById('siteFooterEffect').value = config.site_footer_effect || 'none';
    updateEffectPreview('siteFooter', config.site_footer_effect || 'none');

    // 强调色
    const accent = config.accent_color || '#667eea';
    document.getElementById('accentColor').value = accent;
    document.getElementById('accentColorText').value = accent;

    // 卡片透明度
    const opacity = config.card_opacity !== undefined ? config.card_opacity : 0.03;
    document.getElementById('cardOpacity').value = opacity;
    document.getElementById('cardOpacityValue').textContent = opacity;

    // 自定义CSS/JS
    document.getElementById('customCss').value = config.site_custom_css || '';
    document.getElementById('customJs').value = config.site_custom_js || '';
}

function onBgTypeChange(type) {
    document.getElementById('bgGradientGroup').style.display = type === 'gradient' ? 'block' : 'none';
    document.getElementById('bgImageGroup').style.display = type === 'image' ? 'block' : 'none';
    document.getElementById('bgColorGroup').style.display = type === 'color' ? 'block' : 'none';

    document.querySelectorAll('.radio-card').forEach(el => {
        el.classList.toggle('active', el.getAttribute('data-value') === type);
    });
}

// ===== 标题模式切换（文字模式/图片模式）=====
function onTitleModeChange(mode) {
    document.getElementById('titleTextModeArea').style.display = mode === 'logo_image' ? 'none' : 'block';
    document.getElementById('titleImageModeArea').style.display = mode === 'logo_image' ? 'block' : 'none';
    document.querySelectorAll('.radio-card').forEach(el => {
        const v = el.getAttribute('data-value');
        if (v === 'logo_text' || v === 'logo_image') {
            el.classList.toggle('active', v === mode);
        }
    });
    // 当选择图片模式时，禁用siteTitle输入框（不可编辑）
    document.getElementById('siteTitle').disabled = (mode === 'logo_image');
    document.getElementById('siteTitle').style.opacity = (mode === 'logo_image') ? '0.5' : '1';
    document.getElementById('siteTitle').style.cursor = (mode === 'logo_image') ? 'not-allowed' : '';
}

function onLogoWidthChange(value) {
    document.getElementById('logoWidthSlider').value = value;
    document.getElementById('logoWidthInput').value = value;
    // 如果勾选了等比例，高度跟随宽度
    if (document.getElementById('logoAspectLock').checked) {
        document.getElementById('logoHeightSlider').value = value;
        document.getElementById('logoHeightInput').value = value;
    }
    updateLogoSizeDisplay();
}

function onLogoHeightChange(value) {
    document.getElementById('logoHeightSlider').value = value;
    document.getElementById('logoHeightInput').value = value;
    // 如果勾选了等比例，宽度跟随高度
    if (document.getElementById('logoAspectLock').checked) {
        document.getElementById('logoWidthSlider').value = value;
        document.getElementById('logoWidthInput').value = value;
    }
    updateLogoSizeDisplay();
}

function onLogoScaleMode(checked) {
    // 如果勾选等比例，让高度滑块=宽度滑块并禁用高度滑块
    const heightSlider = document.getElementById('logoHeightSlider');
    const heightInput = document.getElementById('logoHeightInput');
    if (checked) {
        const w = document.getElementById('logoWidthSlider').value;
        heightSlider.value = w;
        heightInput.value = w;
        heightSlider.disabled = true;
        heightInput.disabled = true;
    } else {
        heightSlider.disabled = false;
        heightInput.disabled = false;
    }
    updateLogoSizeDisplay();
}

function updateLogoSizeDisplay() {
    const w = document.getElementById('logoWidthSlider').value;
    const h = document.getElementById('logoHeightSlider').value;
    document.getElementById('logoCurrentSize').textContent = `${w}% × ${h}%`;
}

function onLogoLayoutChange(type) {
    document.querySelectorAll('.radio-card').forEach(el => {
        const v = el.getAttribute('data-value');
        if (v === 'horizontal' || v === 'vertical') {
            el.classList.toggle('active', v === type);
        }
    });
}

function onLogoRotateChange(value) {
    document.getElementById('logoRotateSlider').value = value;
    document.getElementById('logoRotateInput').value = value;
}

// ===== 样式面板折叠 =====
function toggleStylePanel(panelId, toggleEl) {
    const panel = document.getElementById(panelId);
    if (!panel) return;
    const isOpen = panel.classList.toggle('open');
    toggleEl.classList.toggle('open', isOpen);
    toggleEl.textContent = isOpen ? toggleEl.textContent.replace('▾', '▴') : toggleEl.textContent.replace('▴', '▾');
}

// ===== 刷新分类排序 =====
function reorderCategories() {
    // 按 catOrder 排序所有分类
    data.categories.sort((a, b) => (a.catOrder ?? 999) - (b.catOrder ?? 999));
    // 重新分配 catOrder = 1,2,3...
    data.categories.forEach((c, ci) => { c.catOrder = ci + 1; });
    // 对每个分类下的站点按 order 排序，重新分配 order = 1,2,3...
    data.categories.forEach(c => {
        c.sites.sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
        c.sites.forEach((s, si) => { s.order = si + 1; });
    });
    renderCategories();
    toast('✅ 分类排序已刷新', 'success');
}

// ===== 颜色/渐变预设点击 =====
document.addEventListener('click', function(e) {
    const preset = e.target.closest('.color-preset');
    if (preset) {
        const val = preset.getAttribute('data-value');
        const parent = preset.closest('.form-group');
        if (parent) {
            const colorInput = parent.querySelector('input[type="color"]');
            const textInput = parent.querySelector('input[type="text"]');
            if (colorInput) colorInput.value = val;
            if (textInput) textInput.value = val;
        }
        document.querySelectorAll('.color-preset').forEach(p => p.classList.remove('active'));
        preset.classList.add('active');
    }

    const gPreset = e.target.closest('.gradient-preset');
    if (gPreset) {
        const val = gPreset.getAttribute('data-value');
        document.getElementById('bgGradient').value = val;
        document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('active'));
        gPreset.classList.add('active');
    }
});

// 颜色输入同步
document.addEventListener('input', function(e) {
    if (e.target.id === 'bgColor' || e.target.id === 'bgColorText') {
        const color = document.getElementById('bgColor');
        const text = document.getElementById('bgColorText');
        if (e.target.id === 'bgColor') text.value = e.target.value;
        else if (/^#[0-9a-f]{6}$/i.test(e.target.value)) color.value = e.target.value;
    }
    if (e.target.id === 'accentColor' || e.target.id === 'accentColorText') {
        const color = document.getElementById('accentColor');
        const text = document.getElementById('accentColorText');
        if (e.target.id === 'accentColor') text.value = e.target.value;
        else if (/^#[0-9a-f]{6}$/i.test(e.target.value)) color.value = e.target.value;
    }
    // Logo 文字颜色同步
    if (e.target.id === 'logoTextColor' || e.target.id === 'logoTextColorText') {
        const color = document.getElementById('logoTextColor');
        const text = document.getElementById('logoTextColorText');
        if (e.target.id === 'logoTextColor') text.value = e.target.value;
        else if (/^#[0-9a-f]{6}$/i.test(e.target.value)) color.value = e.target.value;
    }
    if (e.target.id === 'logoTextOpacity') {
        document.getElementById('logoTextOpacityValue').textContent = Number(e.target.value).toFixed(2);
    }
    // 标题颜色同步
    if (e.target.id === 'siteTitleColor' || e.target.id === 'siteTitleColorText') {
        const color = document.getElementById('siteTitleColor');
        const text = document.getElementById('siteTitleColorText');
        if (e.target.id === 'siteTitleColor') text.value = e.target.value;
        else if (/^#[0-9a-f]{6}$/i.test(e.target.value)) color.value = e.target.value;
    }
    if (e.target.id === 'siteTitleOpacity') {
        document.getElementById('siteTitleOpacityValue').textContent = Number(e.target.value).toFixed(2);
    }
    // 副标题颜色同步
    if (e.target.id === 'siteSubtitleColor' || e.target.id === 'siteSubtitleColorText') {
        const color = document.getElementById('siteSubtitleColor');
        const text = document.getElementById('siteSubtitleColorText');
        if (e.target.id === 'siteSubtitleColor') text.value = e.target.value;
        else if (/^#[0-9a-f]{6}$/i.test(e.target.value)) color.value = e.target.value;
    }
    if (e.target.id === 'siteSubtitleOpacity') {
        document.getElementById('siteSubtitleOpacityValue').textContent = Number(e.target.value).toFixed(2);
    }
    // 底部文字颜色同步
    if (e.target.id === 'siteFooterColor' || e.target.id === 'siteFooterColorText') {
        const color = document.getElementById('siteFooterColor');
        const text = document.getElementById('siteFooterColorText');
        if (e.target.id === 'siteFooterColor') text.value = e.target.value;
        else if (/^#[0-9a-f]{6}$/i.test(e.target.value)) color.value = e.target.value;
    }
    if (e.target.id === 'siteFooterOpacity') {
        document.getElementById('siteFooterOpacityValue').textContent = Number(e.target.value).toFixed(2);
    }
    if (e.target.id === 'cardOpacity') {
        document.getElementById('cardOpacityValue').textContent = e.target.value;
    }
});

// ===== 上传背景图片 =====
async function uploadBg() {
    const fileInput = document.getElementById('bgUploadInput');
    const file = fileInput.files[0];
    if (!file) { toast('请选择要上传的图片', 'error'); return; }

    const formData = new FormData();
    formData.append('file', file);

    try {
        const res = await fetch(API + '/upload', { method: 'POST', body: formData });
        const result = await res.json();

// ===== 通用 insertWithOrder 函数 =====
function insertWithOrder(arr, item, orderField, order) {
    if (!order || order < 1) {
        // 追加到最后
        const maxOrder = arr.length > 0 ? Math.max(...arr.map(x => x[orderField] ?? 0)) : 0;
        item[orderField] = maxOrder + 1;
        arr.push(item);
    } else {
        // 检查序号是否被占用
        const conflict = arr.find(x => x[orderField] === order);
        if (conflict) {
            // 从该位置起所有项+1
            arr.forEach(x => {
                if ((x[orderField] ?? 0) >= order) {
                    x[orderField] = (x[orderField] ?? 0) + 1;
                }
            });
        }
        item[orderField] = order;
        arr.push(item);
        // 按order重新排序
        arr.sort((a, b) => (a[orderField] ?? 999) - (b[orderField] ?? 999));
    }
}

// ===== 鼠标吸附拖拽排序（引擎、快捷链接、分类、站点） =====
// ===== 鼠标吸附拖拽（通用） =====
// 全局拖拽状态
let _dragState = null;
let _dragConfigs = [];

function initMouseDrag(containerSelector, itemSelector, getReorderInfo) {
    _dragConfigs.push({ containerSelector, itemSelector, getReorderInfo });
}

function _handleDragMouseDown(e) {
    // 遍历所有配置，找到匹配的 item
    for (const cfg of _dragConfigs) {
        const item = e.target.closest(cfg.itemSelector);
        if (!item) continue;

        // 必须通过拖拽手柄（.drag-handle）启动拖拽，或者点击非交互元素
        const isDragHandle = e.target.closest('.drag-handle') !== null;
        const isNonInteractive = !e.target.closest('button') && !e.target.closest('input') && !e.target.closest('select') && !e.target.closest('.emoji-picker');
        if (!isDragHandle && !isNonInteractive) continue;

        const container = item.closest(cfg.containerSelector);
        if (!container) continue;

        // 如果是分类卡片但点击在站点列表内部，跳过（让站点拖拽处理）
        if (item.matches('.category-card') && e.target.closest('.site-list')) continue;

        const items = [...container.querySelectorAll(cfg.itemSelector)];
        const index = items.indexOf(item);
        if (index === -1) return;

        // 创建克隆
        const rect = item.getBoundingClientRect();
        const clone = item.cloneNode(true);
        clone.style.position = 'fixed';
        clone.style.pointerEvents = 'none';
        clone.style.zIndex = '9999';
        clone.style.opacity = '0.85';
        clone.style.width = rect.width + 'px';
        clone.style.transform = 'scale(1.02)';
        clone.style.boxShadow = '0 8px 32px rgba(0,0,0,0.4)';
        clone.style.borderRadius = '8px';
        clone.style.overflow = 'hidden';
        clone.style.left = rect.left + 'px';
        clone.style.top = rect.top + 'px';
        document.body.appendChild(clone);

        item.classList.add('dragging-item');

        _dragState = {
            el: item,
            clone: clone,
            offsetX: e.clientX - rect.left,
            offsetY: e.clientY - rect.top,
            origIndex: index,
            container: container,
            items: items,
            cfg: cfg
        };
        return; // 首次匹配即处理
    }
}

function _handleDragMouseMove(e) {
    if (!_dragState) return;
    e.preventDefault();

    // 克隆跟随光标
    _dragState.clone.style.top = (e.clientY - _dragState.offsetY) + 'px';
    _dragState.clone.style.left = (e.clientX - _dragState.offsetX) + 'px';

    // 检测鼠标位置下的目标
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const targetItem = target ? target.closest(_dragState.cfg.itemSelector) : null;

    // 清除指示器
    _dragState.items.forEach(item => item.classList.remove('drag-before', 'drag-after'));

    if (targetItem && targetItem !== _dragState.el && _dragState.container.contains(targetItem)) {
        const rect = targetItem.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
            targetItem.classList.add('drag-before');
        } else {
            targetItem.classList.add('drag-after');
        }
    }
}

function _handleDragMouseUp(e) {
    if (!_dragState) return;

    // 移除克隆
    if (_dragState.clone.parentNode) {
        _dragState.clone.parentNode.removeChild(_dragState.clone);
    }
    _dragState.el.classList.remove('dragging-item');

    // 清除指示器
    _dragState.items.forEach(item => item.classList.remove('drag-before', 'drag-after'));

    // 查找插入位置
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const targetItem = target ? target.closest(_dragState.cfg.itemSelector) : null;

    if (targetItem && targetItem !== _dragState.el && _dragState.container.contains(targetItem)) {
        const rect = targetItem.getBoundingClientRect();
        const insertAfter = e.clientY >= rect.top + rect.height / 2;
        _dragState.cfg.getReorderInfo(_dragState.origIndex, targetItem, insertAfter);
    }

    _dragState = null;
}

// 绑定全局事件（只执行一次）
document.addEventListener('mousedown', _handleDragMouseDown);
document.addEventListener('mousemove', _handleDragMouseMove);
document.addEventListener('mouseup', _handleDragMouseUp);

// 初始化所有拖拽
function initAllDrag() {
    // 先清空配置（避免重复）
    _dragConfigs = [];
    // 搜索引擎拖拽
    initMouseDrag('#engineList', '.engine-item', function(fromIdx, targetItem, insertAfter) {
        const items = [...document.querySelectorAll('#engineList .engine-item')];
        const toIdx = items.indexOf(targetItem);
        if (fromIdx === toIdx) return;
        const [moved] = data.searchEngines.splice(fromIdx, 1);
        const adjustedTo = insertAfter ? toIdx + 1 : toIdx;
        data.searchEngines.splice(adjustedTo, 0, moved);
        data.searchEngines.forEach((e, idx) => { e.order = idx + 1; });
        renderEngines();
        toast('✅ 排序已更新', 'success');
    });

    // 快捷链接拖拽
    initMouseDrag('#quickLinkList', '.ql-item', function(fromIdx, targetItem, insertAfter) {
        const items = [...document.querySelectorAll('#quickLinkList .ql-item')];
        const toIdx = items.indexOf(targetItem);
        if (fromIdx === toIdx) return;
        const [moved] = data.quickLinks.splice(fromIdx, 1);
        const adjustedTo = insertAfter ? toIdx + 1 : toIdx;
        data.quickLinks.splice(adjustedTo, 0, moved);
        data.quickLinks.forEach((l, idx) => { l.order = idx + 1; });
        renderQuickLinks();
        toast('✅ 排序已更新', 'success');
    });

    // 分类卡片拖拽
    initMouseDrag('#categoryList', '.category-card', function(fromIdx, targetItem, insertAfter) {
        const items = [...document.querySelectorAll('#categoryList .category-card')];
        const toIdx = items.indexOf(targetItem);
        if (fromIdx === toIdx) return;
        const [moved] = data.categories.splice(fromIdx, 1);
        const adjustedTo = insertAfter ? toIdx + 1 : toIdx;
        data.categories.splice(adjustedTo, 0, moved);
        // 更新每个分类的 catOrder
        data.categories.forEach((c, idx) => { c.catOrder = idx + 1; });
        renderCategories();
        // 保存到服务器
        fetch('/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(() => {});
        toast('✅ 分类排序已保存', 'success');
    });

    // 分类内站点拖拽（为每个分类的 site-list 独立初始化）
    data.categories.forEach((c, ci) => {
        const siteListId = 'siteList-' + ci;
        const siteList = document.getElementById(siteListId);
        if (!siteList) return;
        initMouseDrag('#' + siteListId, '.site-item', function(fromIdx, targetItem, insertAfter) {
            const items = [...document.querySelectorAll('#' + siteListId + ' .site-item')];
            const toIdx = items.indexOf(targetItem);
            if (fromIdx === toIdx) return;
            const sites = data.categories[ci].sites;
            const [moved] = sites.splice(fromIdx, 1);
            const adjustedTo = insertAfter ? toIdx + 1 : toIdx;
            sites.splice(adjustedTo, 0, moved);
            sites.forEach((s, idx) => { s.order = idx + 1; });
            renderCategories();
            fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(() => {});
            toast('✅ 站点排序已保存', 'success');
        });
    });
}

                    </div>`
                ).join('')}
                ${c.sites.length === 0 ? '<div class="empty-state">暂无站点</div>' : ''}
            </div>
        </div>`;
    }).join('');
    if (data.categories.length === 0) {
        el.innerHTML = '<div class="empty-state">暂无分类，点击上方添加</div>';
    }
    _afterRender();
}

function updateCat(ci, field, value) {
    // 如果是修改 catOrder，检查序号冲突
    if (field === 'catOrder') {
        const conflict = data.categories.find((c, i) => i !== ci && c.catOrder === value);
        if (conflict) {
            toast('❌ 序号 ' + value + ' 已被「' + conflict.name + '」使用，请重新输入', 'error');
            // 恢复原值
            const input = document.getElementById('catOrderInput-' + ci);
            if (input) input.value = data.categories[ci].catOrder ?? ci + 1;
            return;
        }
    }
    data.categories[ci][field] = value;
}

function addCategory() {
    // 自动计算下一个分类序号
    const nextCatOrder = data.categories.length > 0 ? Math.max(...data.categories.map(c => c.catOrder ?? 0)) + 1 : 1;
    showModal('添加分类', `
        <div class="form-row">
            <div class="form-group">
                <label>分类序号</label>
                <input id="catOrderAdd" type="number" min="1" value="${nextCatOrder}" placeholder="1">
            </div>
            <div class="form-group">
                <label>图标 (emoji)</label>
                <div style="display:flex;gap:8px;">
                    <input id="catIconAdd" placeholder="📁" value="📁" style="flex:1;">
                    <button type="button" class="emoji-btn" onclick="toggleModalEmojiPicker()" title="选择Emoji">😊 选择</button>
                </div>
                <div class="emoji-picker open" id="modalEmojiPicker" style="max-height:120px;margin-top:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);"></div>
            </div>
        </div>
        <div class="form-group"><label>分类名称</label><input id="catNameAdd" placeholder="新分类"></div>
    `, () => {
        const catOrder = parseInt(document.getElementById('catOrderAdd').value) || nextCatOrder;
        // 检查序号冲突
        const conflict = data.categories.find(c => c.catOrder === catOrder);
        if (conflict) {
            toast('❌ 序号 ' + catOrder + ' 已被「' + conflict.name + '」使用，请重新输入', 'error');
            return;
        }
        const icon = document.getElementById('catIconAdd').value.trim() || '📁';
        const name = document.getElementById('catNameAdd').value.trim() || '新分类';
        data.categories.push({ icon, name, catOrder, sites: [] });
        renderCategories();
        toast('分类已添加', 'success');
        closeModal();
    });
    // 填充弹窗中的 emoji picker
    const picker = document.getElementById('modalEmojiPicker');
    if (picker) {
        picker.innerHTML = CATEGORY_EMOJIS.map(e => `<span onclick="document.getElementById('catIconAdd').value='${e}'; this.closest('.emoji-picker').querySelectorAll('span').forEach(s=>s.style.background=''); this.style.background='rgba(102,126,234,0.3)'">${e}</span>`).join('');
    }
}

function deleteCategory(ci) {
    if (!confirm('确定删除分类「' + data.categories[ci].name + '」及其所有站点？')) return;
    data.categories.splice(ci, 1);
    renderCategories();
    toast('分类已删除', 'info');
}

// ===== Emoji 选择器 (分类管理) =====
function toggleEmojiPicker(ci) {
    const picker = document.getElementById('emojiPicker-' + ci);
    if (!picker) return;
    const isOpen = picker.classList.toggle('open');
    if (isOpen && picker.children.length === 0) {
        picker.innerHTML = CATEGORY_EMOJIS.map(e =>
            `<span onclick="selectCatEmoji(${ci}, '${e}')">${e}</span>`
        ).join('');
    }
}

function selectCatEmoji(ci, emoji) {
    const input = document.getElementById('catIconInput-' + ci);
    if (input) input.value = emoji;
    data.categories[ci].icon = emoji;
    // 关闭 picker
    const picker = document.getElementById('emojiPicker-' + ci);
    if (picker) picker.classList.remove('open');
}

function toggleModalEmojiPicker() {
    const picker = document.getElementById('modalEmojiPicker');
    if (picker) picker.classList.toggle('open');
}

function addSite(ci) {
    // 自动计算下一个序号
    const sites = data.categories[ci].sites;
    const nextOrder = sites.length > 0 ? Math.max(...sites.map(s => s.order ?? 0)) + 1 : 1;
    showModal('添加站点', `
        <div class="form-group"><label>站点名称</label><input id="siteName" placeholder="ChatGPT"></div>
        <div class="form-group"><label>链接</label><input id="siteUrl" placeholder="https://chatgpt.com"></div>
        <div class="form-row">
            <div class="form-group">
                <label>序号 (数字越小越靠前)</label>
                <input id="siteOrder" type="number" min="1" value="${nextOrder}" placeholder="1">
            </div>
            <div class="form-group">
                <label>图标URL (可选,留空自动)</label>
                <div style="display:flex;gap:8px;">
                    <input id="siteIcon" placeholder="https://chatgpt.com/favicon.ico" style="flex:1;">
                    <button type="button" class="btn-ghost" onclick="uploadToField('siteIcon', true)" style="padding:8px 12px;font-size:12px;white-space:nowrap;">📤 图标上传</button>
                </div>
            </div>
        </div>
    `, () => {
        const name = document.getElementById('siteName').value.trim();
        const url = document.getElementById('siteUrl').value.trim();
        if (!name || !url) { toast('请填写名称和链接', 'error'); return; }
        const order = parseInt(document.getElementById('siteOrder').value) || nextOrder;
        let icon = document.getElementById('siteIcon').value.trim();
        if (!icon) {
            try { icon = `https://${new URL(url).hostname}/favicon.ico`; } catch(e) { icon = ''; }
        }
        data.categories[ci].sites.push({ name, url, icon, order });
        renderCategories();
        toast('站点已添加', 'success');
        closeModal();
    });
}

function editSite(ci, si) {
    const s = data.categories[ci].sites[si];
    showModal('编辑站点', `
        <div class="form-group"><label>站点名称</label><input id="siteName" value="${esc(s.name)}"></div>
        <div class="form-group"><label>链接</label><input id="siteUrl" value="${esc(s.url)}"></div>
        <div class="form-row">
            <div class="form-group">
                <label>序号 (数字越小越靠前)</label>
                <input id="siteOrder" type="number" min="1" value="${s.order ?? 1}" placeholder="1">
            </div>
            <div class="form-group">
                <label>图标URL</label>
                <div style="display:flex;gap:8px;">
                    <input id="siteIcon" value="${esc(s.icon||'')}" style="flex:1;">
                    <button type="button" class="btn-ghost" onclick="uploadToField('siteIcon', true)" style="padding:8px 12px;font-size:12px;white-space:nowrap;">📤 图标上传</button>
                </div>
            </div>
        </div>
    `, () => {
        data.categories[ci].sites[si] = {
            name: document.getElementById('siteName').value.trim(),
            url: document.getElementById('siteUrl').value.trim(),
            icon: document.getElementById('siteIcon').value.trim(),
            order: parseInt(document.getElementById('siteOrder').value) || 1
        };
        renderCategories();
        toast('已更新', 'success');
        closeModal();
    });
}

function deleteSite(ci, si) {
    const s = data.categories[ci].sites[si];
    if (!confirm('确定删除站点「' + s.name + '」？')) return;
    data.categories[ci].sites.splice(si, 1);
    renderCategories();
    toast('已删除', 'info');
}

// ===== 保存 =====
async function saveData() {
    data.site.title = document.getElementById('siteTitle').value.trim() || '东白湖之家';
    data.site.subtitle = document.getElementById('siteSubtitle').value.trim() || '上网从这里开始';
    data.site.footer = document.getElementById('siteFooter').value.trim() || '🏠 东白湖之家 · 上网从这里开始';

    // 收集外观配置
    const newConfig = {
        site_title: document.getElementById('siteTitle').value.trim() || '东白湖之家',
        site_subtitle: document.getElementById('siteSubtitle').value.trim() || '上网从这里开始',
        site_logo: document.getElementById('siteLogo').value.trim(),
        logo_mode: document.querySelector('input[name="titleMode"]:checked')?.value || 'logo_text',
        logo_width_pct: parseInt(document.getElementById('logoWidthSlider').value) || 50,
        logo_height_pct: parseInt(document.getElementById('logoHeightSlider').value) || 50,
        logo_scale_mode: document.getElementById('logoAspectLock').checked,
        logo_layout: document.querySelector('input[name="logoLayout"]:checked')?.value || 'horizontal',
        logo_rotate: parseInt(document.getElementById('logoRotateSlider').value) || 0,
        logo_text: document.getElementById('logoText').value.trim(),
        logo_text_font: document.getElementById('logoTextFont').value,
        logo_text_size: parseInt(document.getElementById('logoTextSize').value) || 48,
        logo_text_color: document.getElementById('logoTextColorText').value.trim() || '#ffffff',
        logo_text_opacity: parseFloat(document.getElementById('logoTextOpacity').value) || 1,
        logo_text_effect: document.getElementById('logoTextEffect').value,
        logo_opacity: parseFloat(document.getElementById('logoOpacity').value) || 1,
        logo_image_effect: document.getElementById('logoImageEffect').value,
        site_title_font: document.getElementById('siteTitleFont').value,
        site_title_size: parseInt(document.getElementById('siteTitleSize').value) || 36,
        site_title_color: document.getElementById('siteTitleColorText').value.trim() || '#ffffff',
        site_title_opacity: parseFloat(document.getElementById('siteTitleOpacity').value) || 1,
        site_title_effect: document.getElementById('siteTitleEffect').value,
        site_subtitle_font: document.getElementById('siteSubtitleFont').value,
        site_subtitle_size: parseInt(document.getElementById('siteSubtitleSize').value) || 18,
        site_subtitle_color: document.getElementById('siteSubtitleColorText').value.trim() || '#aaaaaa',
        site_subtitle_opacity: parseFloat(document.getElementById('siteSubtitleOpacity').value) || 1,
        site_subtitle_effect: document.getElementById('siteSubtitleEffect').value,
        site_footer_font: document.getElementById('siteFooterFont').value,
        site_footer_size: parseInt(document.getElementById('siteFooterSize').value) || 14,
        site_footer_color: document.getElementById('siteFooterColorText').value.trim() || '#888888',
        site_footer_opacity: parseFloat(document.getElementById('siteFooterOpacity').value) || 1,
        site_footer_effect: document.getElementById('siteFooterEffect').value,
        site_background: document.getElementById('bgImage').value.trim(),
        site_background_mobile: document.getElementById('bgImageMobile').value.trim(),
        site_footer: document.getElementById('siteFooter').value.trim() || '🏠 东白湖之家 · 上网从这里开始',
        site_icp: document.getElementById('siteIcp').value.trim(),
        site_custom_css: document.getElementById('customCss').value.trim(),
        site_custom_js: document.getElementById('customJs').value.trim(),
        bg_type: document.querySelector('input[name="bgType"]:checked')?.value || 'gradient',
        bg_color: document.getElementById('bgColorText').value.trim() || '#0f0c29',
        bg_gradient: document.getElementById('bgGradient').value.trim() || 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)',
        card_opacity: parseFloat(document.getElementById('cardOpacity').value) || 0.03,
        accent_color: document.getElementById('accentColorText').value.trim() || '#667eea',
        site_keywords: config?.site_keywords || '',
        site_description: config?.site_description || ''
    };

    const btn = document.getElementById('saveBtn');
    btn.textContent = '⏳ 保存中...';
    btn.disabled = true;

    try {
        const [dataRes, configRes] = await Promise.all([
            fetch(API + '/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }),
            fetch(API + '/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },

        ]);
        const dataResult = await dataRes.json();
        const configResult = await configRes.json();

        if (dataResult.success && configResult.success) {
            // 保存成功 → 自动刷新页面，使排序结果立即可见
            setTimeout(() => location.reload(), 800);
            toast('✅ 保存成功！页面即将刷新...', 'success');
        } else {
            toast('❌ ' + (dataResult.error || configResult.error || '保存失败'), 'error');
        }
    } catch(e) {
        toast('❌ 保存失败: ' + e.message, 'error');
    }

    btn.textContent = '💾 保存';
    btn.disabled = false;
}

// ===== 通用图片上传 =====
// 隐藏的文件选择器，用于所有上传按钮
let pendingUploadField = null;
let pendingUploadIsIcon = false;

function uploadToField(fieldId, isIcon) {
    pendingUploadField = fieldId;
    pendingUploadIsIcon = !!isIcon;
    const input = document.getElementById('_uploadFileInput');
    input.value = '';
    input.click();
}

// 创建隐藏的文件输入框
(function() {
    const input = document.createElement('input');
    input.type = 'file';
    input.id = '_uploadFileInput';
    input.accept = 'image/*';
    input.style.display = 'none';
    input.onchange = async function() {
        const file = input.files[0];
        if (!file) return;
        const fieldId = pendingUploadField;
        if (!fieldId) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch(API + '/upload', { method: 'POST', body: formData });
            const result = await res.json();
            if (result.success) {
                document.getElementById(fieldId).value = result.url;
                toast('✅ 图片上传成功！', 'success');
            } else {
                toast('❌ 上传失败: ' + (result.error || '未知错误'), 'error');
            }
        } catch(e) {
            toast('❌ 上传失败: ' + e.message, 'error');
        }
    };
    document.body.appendChild(input);
})();

// ===== 工具函数 =====
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg, type) {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

function showModal(title, body, onConfirm) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
        <h3>${title}</h3>
        ${body}
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-confirm" id="modalConfirmBtn">确定</button>
        </div>
    `;
    overlay.classList.add('active');
    document.getElementById('modalConfirmBtn').onclick = onConfirm;
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').onclick = function(e) {
    if (e.target === this) closeModal();
};

// ===== 工具函数 =====
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== 字体预览 =====
function updateFontPreview(prefix) {
    const preview = document.getElementById(prefix + 'FontPreview');
    if (!preview) return;
    const fontSelect = document.getElementById(prefix + 'Font');
    const font = fontSelect.value;
    // 读取对应字段的实际内容
    let content = '';
    if (prefix === 'siteTitle') content = document.getElementById('siteTitle').value || '网站标题';
    else if (prefix === 'siteSubtitle') content = document.getElementById('siteSubtitle').value || '副标题';
    else if (prefix === 'siteFooter') content = document.getElementById('siteFooter').value || '底部文字';
    else content = '字体预览';
    if (font) {
        preview.innerHTML = '<span style="font-family:&quot;' + font + '&quot;,sans-serif;font-size:20px;">' + escapeHtml(content) + '</span>';
    } else {
        preview.innerHTML = '<span style="opacity:0.5;">' + escapeHtml(content) + '（默认字体）</span>';
    }
}

// ===== 特效预览 =====
function updateEffectPreview(prefix, effect) {
    const preview = document.getElementById(prefix + 'EffectPreview');
    if (!preview) return;
    const effects = {
        none: '',
        marquee: '<marquee style="color:#667eea">🔄 滚动效果运行中...</marquee>',
        typing: '<span style="border-right:2px solid #667eea;animation:blink 1s step-end infinite;">✍️ 打字机效果...</span>',
        fade: '<span style="animation:fadeEffect 1.5s ease-in-out infinite">✨ 淡入淡出效果</span>',
        blink: '<span style="animation:blink 1s step-end infinite">💡 闪烁效果</span>',
        neon: '<span style="text-shadow:0 0 10px #667eea,0 0 20px #667eea,0 0 40px #667eea;animation:pulse 2s ease-in-out infinite">💜 霓虹效果</span>',
        pulse: '<span style="animation:pulse 2s ease-in-out infinite">💓 脉冲效果</span>',
        shake: '<span style="display:inline-block;animation:shake 0.5s ease-in-out infinite">🤪 摇摆效果</span>',
        bounce: '<span style="display:inline-block;animation:bounce 1s ease infinite">🏀 弹跳效果</span>',

}
